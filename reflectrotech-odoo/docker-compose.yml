version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - blog_db:/var/lib/mysql
    networks:
      - blog-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  blog_backend:
    image: blog-management-system-blog_backend:latest
    container_name: blog_backend
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blog-network
    restart: always

volumes:
  blog_db:

networks:
  blog-network:
    driver: bridge